services:
  pipeline:
    build: .
    volumes:
      - .:/app
      - ./output:/app/data
    environment:
      - PIPELINE_CONFIG=config/pipeline_config.yaml

  notebook:
    build: .
    command: jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token='' --NotebookApp.password=''
    ports:
      - "8888:8888"
    volumes:
      - .:/app
      - ./output:/app/data
    environment:
      - PYTHONPATH=/app